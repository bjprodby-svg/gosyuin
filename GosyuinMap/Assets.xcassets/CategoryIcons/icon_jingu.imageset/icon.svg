<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Grand Shrine (神宮) - Ise-style with chigi -->
  <!-- Main roof -->
  <polygon points="32,6 6,34 58,34" fill="currentColor"/>
  <!-- Chigi (crossed beams on top) -->
  <line x1="22" y1="2" x2="30" y2="18" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="42" y1="2" x2="34" y2="18" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Katsuogi (horizontal logs) -->
  <rect x="25" y="10" width="14" height="3" rx="1.5" fill="currentColor"/>
  <!-- Body -->
  <rect x="14" y="34" width="36" height="20" fill="currentColor"/>
  <!-- Door -->
  <rect x="26" y="40" width="12" height="14" rx="2" fill="white"/>
  <!-- Foundation -->
  <rect x="10" y="54" width="44" height="4" rx="1" fill="currentColor"/>
  <rect x="6" y="58" width="52" height="3" rx="1" fill="currentColor"/>
</svg>
