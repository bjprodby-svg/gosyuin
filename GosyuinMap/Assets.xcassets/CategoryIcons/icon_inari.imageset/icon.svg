<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Inari (稲荷) - Fox face -->
  <!-- Ears -->
  <polygon points="12,6 8,30 24,24" fill="currentColor"/>
  <polygon points="52,6 56,30 40,24" fill="currentColor"/>
  <!-- Face -->
  <ellipse cx="32" cy="36" rx="22" ry="24" fill="currentColor"/>
  <!-- Inner ears -->
  <polygon points="15,12 13,26 22,22" fill="white"/>
  <polygon points="49,12 51,26 42,22" fill="white"/>
  <!-- Eyes -->
  <ellipse cx="23" cy="32" rx="3.5" ry="2" fill="white" transform="rotate(-10 23 32)"/>
  <ellipse cx="41" cy="32" rx="3.5" ry="2" fill="white" transform="rotate(10 41 32)"/>
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="3" ry="2.5" fill="white"/>
  <!-- Mouth lines -->
  <path d="M22 44 Q27 48, 32 44 Q37 48, 42 44" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
